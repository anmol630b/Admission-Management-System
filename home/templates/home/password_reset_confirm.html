{% extends "home/base.html" %}
{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="container" style="max-width: 450px; margin-top: 100px;">
    <div class="card shadow-lg border-0">
        <div class="card-body p-4">
            <h3 class="text-center mb-4" style="font-weight:700;">🔒 New Password Set Karo</h3>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    {{ form.new_password1 }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    {{ form.new_password2 }}
                </div>
                <button type="submit" class="btn btn-warning w-100 mt-2">Reset Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
