{% extends "home/base.html" %}
{% load static %}
{% block title %}Email Sent - Univio{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}
<div class="login-page-wrapper">
  <div class="login-card" style="text-align:center;">

    <div class="login-logo">
      <div class="logo-mark" style="background: linear-gradient(135deg,#198754,#57c287);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
    </div>

    <h2 class="login-heading">Email Sent!</h2>
    <p class="login-sub">Password reset link has been sent to your email. Please check your inbox.</p>

    <a href="{% url 'login' %}" class="login-submit-btn" style="display:flex; margin-top:20px; text-decoration:none;">
      <i class="fas fa-sign-in-alt"></i>
      <span>Back to Login</span>
    </a>

  </div>
</div>
{% endblock %}
