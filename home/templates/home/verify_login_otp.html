{% extends "home/base.html" %}
{% block title %}Verify OTP{% endblock %}

{% block content %}
<div class="container" style="max-width: 450px; margin-top: 100px;">
    <div class="card shadow-lg border-0">
        <div class="card-body p-4">
            <h3 class="card-title text-center mb-4" style="font-weight: 700;">Verify OTP</h3>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} text-center">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <p class="text-center text-muted">OTP tumhare email pe bheja gaya hai</p>

            <form method="POST" action="{% url 'verify_login_otp' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Enter 6-digit OTP</label>
                    <input type="text" class="form-control text-center" name="otp"
                           placeholder="• • • • • •" maxlength="6"
                           style="font-size: 1.5rem; letter-spacing: 8px;" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">Verify & Login</button>
            </form>

            <div class="text-center mt-3">
                <p class="mb-0">
                    OTP nahi aaya?
                    <a href="{% url 'login_otp' %}" class="fw-bold text-decoration-none">Resend OTP</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
